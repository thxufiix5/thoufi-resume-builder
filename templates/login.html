<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Thoufi Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(37, 99, 235, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(147, 197, 253, 0.05) 0%, transparent 50%);
            animation: bgRotate 25s linear infinite;
        }

        @keyframes bgRotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .man-on-top {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            animation: manBounce 2s ease-in-out infinite;
        }

        @keyframes manBounce {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-15px);
            }
        }

        .celebration-man {
            width: 80px;
            height: 160px;
            position: relative;
        }

        .c-head {
            width: 28px;
            height: 28px;
            background: #f5d0b0;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 26px;
        }

        .c-hair {
            width: 32px;
            height: 10px;
            background: #1a1a2e;
            border-radius: 50% 50% 0 0;
            position: absolute;
            top: -3px;
            left: -2px;
        }

        .c-body {
            width: 32px;
            height: 50px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-radius: 8px;
            position: absolute;
            top: 28px;
            left: 24px;
        }

        .c-arm-left,
        .c-arm-right {
            width: 10px;
            height: 40px;
            background: #f5d0b0;
            border-radius: 5px;
            position: absolute;
            top: 30px;
            transform-origin: top center;
        }

        .c-arm-left {
            left: 14px;
            animation: celebrateLeft 1.5s ease-in-out infinite;
        }

        .c-arm-right {
            right: 14px;
            animation: celebrateRight 1.5s ease-in-out infinite;
        }

        @keyframes celebrateLeft {

            0%,
            100% {
                transform: rotate(-150deg);
            }

            50% {
                transform: rotate(-140deg);
            }
        }

        @keyframes celebrateRight {

            0%,
            100% {
                transform: rotate(150deg);
            }

            50% {
                transform: rotate(140deg);
            }
        }

        .c-hand {
            width: 12px;
            height: 12px;
            background: #f5d0b0;
            border-radius: 50%;
            position: absolute;
            bottom: -4px;
            left: -1px;
        }

        .c-leg-left,
        .c-leg-right {
            width: 12px;
            height: 45px;
            background: #1e3a5f;
            border-radius: 6px;
            position: absolute;
            top: 75px;
        }

        .c-leg-left {
            left: 28px;
            transform: rotate(-10deg);
        }

        .c-leg-right {
            right: 28px;
            transform: rotate(10deg);
        }

        .c-shoe {
            width: 18px;
            height: 8px;
            background: #1a1a2e;
            border-radius: 0 0 9px 9px;
            position: absolute;
            bottom: -3px;
            left: -3px;
        }

        .c-shoe::after {
            content: '';
            width: 14px;
            height: 2px;
            background: #fbbf24;
            position: absolute;
            bottom: 2px;
            left: 2px;
            border-radius: 1px;
        }

        .confetti-around {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .mini-confetti {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: miniConfettiFall 2s ease-out infinite;
        }

        @keyframes miniConfettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }

            100% {
                opacity: 0;
                transform: translateY(80px) rotate(360deg);
            }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            margin-top: 100px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 28px;
            padding: 50px 45px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 100px rgba(37, 99, 235, 0.1);
            animation: cardSlideUp 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #2563eb, #3b82f6, #60a5fa, #3b82f6, #2563eb);
            background-size: 200% 100%;
            animation: gradientShift 3s linear infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        @keyframes cardSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #1d4ed8 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            animation: logoPulse 2s ease-in-out infinite;
            box-shadow: 0 10px 40px rgba(37, 99, 235, 0.3);
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 10px 40px rgba(37, 99, 235, 0.3);
                transform: scale(1);
            }

            50% {
                box-shadow: 0 15px 50px rgba(37, 99, 235, 0.5);
                transform: scale(1.02);
            }
        }

        .logo-icon svg {
            width: 35px;
            height: 35px;
            fill: #fff;
        }

        .logo-title {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #93c5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-subtitle {
            font-size: 0.95rem;
            color: #60a5fa;
            margin-top: 5px;
            font-weight: 500;
        }

        .tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 6px;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: #fff;
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.3);
        }

        .tab-btn:hover:not(.active) {
            color: #e2e8f0;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #3b82f6;
            font-size: 1rem;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            padding: 16px 18px 16px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.15);
        }

        .form-input::placeholder {
            color: #475569;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #1d4ed8 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(37, 99, 235, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 18px;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: #475569;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
        }

        .divider span {
            padding: 0 15px;
        }

        .guest-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .guest-btn:hover {
            border-color: rgba(59, 130, 246, 0.5);
            color: #e2e8f0;
            background: rgba(59, 130, 246, 0.05);
        }

        .login-footer {
            text-align: center;
            margin-top: 35px;
            color: #475569;
            font-size: 0.8rem;
        }

        .login-footer a {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        .login-footer a:hover {
            color: #93c5fd;
        }

        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .feature-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #60a5fa;
            background: rgba(59, 130, 246, 0.08);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }

            .logo-title {
                font-size: 1.6rem;
            }

            .features {
                gap: 10px;
            }

            .feature-badge {
                font-size: 0.7rem;
                padding: 5px 10px;
            }

            .login-wrapper {
                margin-top: 80px;
            }

            .celebration-man {
                transform: scale(0.8);
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 8s;"></div>

    <div class="man-on-top">
        <div class="celebration-man">
            <div class="c-head">
                <div class="c-hair"></div>
            </div>
            <div class="c-body"></div>
            <div class="c-arm-left">
                <div class="c-hand"></div>
            </div>
            <div class="c-arm-right">
                <div class="c-hand"></div>
            </div>
            <div class="c-leg-left">
                <div class="c-shoe"></div>
            </div>
            <div class="c-leg-right">
                <div class="c-shoe"></div>
            </div>
        </div>
        <div class="confetti-around" id="confettiAround"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <h1 class="logo-title">THOUFI</h1>
                <p class="logo-subtitle">AI Resume Builder</p>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-input" id="loginUsername" placeholder="Enter username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="loginPassword" placeholder="Enter password"
                            required>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="loginSubmit">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-input" id="regUsername" placeholder="Choose username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-input" id="regEmail" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="regPassword" placeholder="Create password"
                            required>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="regSubmit">
                    <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="message" id="message"></div>

            <div class="divider"><span>or</span></div>

            <button class="guest-btn" onclick="guestLogin()">
                <i class="fas fa-user-circle"></i> Continue as Guest
            </button>

            <div class="features">
                <div class="feature-badge"><i class="fas fa-robot"></i> AI Powered</div>
                <div class="feature-badge"><i class="fas fa-chart-line"></i> ATS Optimized</div>
                <div class="feature-badge"><i class="fas fa-magic"></i> Smart Builder</div>
            </div>

            <div class="login-footer">
                <p>Built by <a href="https://instagram.com/thxufii.x5" target="_blank">@thxufii.x5</a></p>
                <p style="margin-top: 5px;">mohamedthoufiq.dev@gmail.com</p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabs[0].classList.add('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabs[1].classList.add('active');
            }
            document.getElementById('message').className = 'message';
        }
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginSubmit');
            btn.classList.add('loading');
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (err) {
                showMessage('Connection error. Please try again.', 'error');
            }
            btn.classList.remove('loading');
        }
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regSubmit');
            btn.classList.add('loading');
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('Account created! Please sign in.', 'success');
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (err) {
                showMessage('Connection error. Please try again.', 'error');
            }
            btn.classList.remove('loading');
        }
        function guestLogin() {
            showMessage('Welcome, Guest! Redirecting...', 'success');
            setTimeout(() => window.location.href = '/dashboard', 1000);
        }

        function createMiniConfetti() {
            const container = document.getElementById('confettiAround');
            const colors = ['#3b82f6', '#2563eb', '#60a5fa', '#fbbf24', '#22c55e', '#fff'];
            for (let i = 0; i < 15; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'mini-confetti';
                confetti.style.left = (Math.random() * 100 - 20) + 'px';
                confetti.style.top = (Math.random() * 40) + 'px';
                confetti.style.animationDelay = (Math.random() * 2) + 's';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (Math.random() * 5 + 3) + 'px';
                confetti.style.height = (Math.random() * 5 + 3) + 'px';
                container.appendChild(confetti);
            }
        }
        createMiniConfetti();
    </script>
</body>

</html>
